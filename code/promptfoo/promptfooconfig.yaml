# promptfoo config: compare evidence-review PROMPT VARIANTS on the labeled sample set.
#
# Setup (once):
#   export DEEPINFRA_TOKEN=...                 # or put it in code/.env and `set -a; . code/.env`
#   export PROMPTFOO_PYTHON=../../.venv/bin/python   # venv with openai + Pillow installed
#   python code/promptfoo/gen_tests.py         # writes tests.json from sample_claims.csv
#
# Run:
#   cd code/promptfoo && promptfoo eval && promptfoo view
#
# Each prompt variant is scored against gold THROUGH the deterministic rule layer
# (see pf_assert.py), so the comparison reflects the real pipeline, not raw model output.

description: Evidence-review prompt comparison (DeepInfra Qwen3-VL-30B)

prompts:
  - id: file://pf_prompts.py:prompt_full
    label: full (rubric + requirements)
  - id: file://pf_prompts.py:prompt_no_rubric
    label: no_rubric
  - id: file://pf_prompts.py:prompt_terse
    label: terse

providers:
  - id: openai:chat:Qwen/Qwen3-VL-30B-A3B-Instruct
    config:
      apiBaseUrl: https://api.deepinfra.com/v1/openai
      apiKeyEnvar: DEEPINFRA_TOKEN
      temperature: 0
      response_format:
        type: json_object

tests: file://tests.json

defaultTest:
  assert:
    - type: python
      value: file://pf_assert.py
